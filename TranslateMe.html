<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignifyID - Terjemah Dinamis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f3f4f6;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">

    <div class="w-[390px] h-[844px] bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col relative border-8 border-gray-800">
        
        <div class="px-5 pt-6 pb-3 flex items-center justify-between bg-white border-b border-gray-100">
            <button class="text-gray-700 text-lg hover:opacity-70">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="flex items-center gap-2">
                <div class="w-15 h-15 rounded-full overflow-hidden">
                    <img src="public/logo.png" alt="Logo SignifyID" class="w-full h-full object-contain">
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="bg-green-100 text-green-600 text-[11px] font-semibold px-2.5 py-1 rounded-full flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> Online
                </span>
                <div class="w-8 h-8 bg-gray-200 rounded-full overflow-hidden border border-gray-300">
                    <img src="public/profil.png" alt="Profile" class="w-full h-full object-cover">
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-5 pt-4 pb-20 no-scrollbar flex flex-col items-center">
            
            <div class="w-48 h-48 my-2 flex items-center justify-center relative">
                <img id="maskot-img" src="public/halo.png" alt="Maskot Isyarat" class="w-full h-full object-contain transition-all duration-300">
            </div>

            <div class="w-full mt-2">
                <div class="flex justify-between items-center mb-1.5">
                    <label class="text-sm font-bold text-blue-950">Masukkan Teks untuk Diterjemahkan</label>
                    <span id="char-count" class="text-xs text-gray-400">0/50 kata</span>
                </div>
                
                <div class="relative w-full">
                    <textarea id="input-text" placeholder="Ketik sesuatu di sini..." 
                        class="w-full h-32 p-4 bg-white border border-gray-200 rounded-2xl resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm text-gray-700 shadow-sm transition-all"></textarea>
                </div>
            </div>

            <button id="btn-translate" class="w-full mt-4 bg-blue-950 hover:bg-blue-900 text-white font-semibold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 shadow-md transition-all active:scale-[0.99]">
                <i class="fa-solid fa-language text-lg"></i>
                <span>Terjemahkan ke Isyarat</span>
            </button>

            <div class="w-full mt-4 flex items-center justify-between gap-4">
                <button id="btn-repeat" class="flex-1 bg-white border border-gray-200 rounded-xl py-2.5 px-4 flex items-center justify-center gap-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 active:scale-[0.98] transition-all">
                    <i class="fa-solid fa-rotate-right text-gray-500"></i>
                    <span>Ulangi</span>
                </button>
                
                <div class="flex-1 bg-white border border-gray-200 rounded-xl py-1 px-3 flex items-center justify-between text-sm font-medium text-gray-700 shadow-sm">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-gauge-high text-gray-400 text-xs"></i>
                        <select id="speed-select" class="bg-transparent focus:outline-none font-semibold text-gray-800 py-1.5 cursor-pointer">
                            <option value="0.5">0.5x</option>
                            <option value="1.0" selected>1.0x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2.0">2.0x</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="w-full mt-5 overflow-x-auto no-scrollbar flex items-center gap-2 py-1">
                <button data-text="Apa kabar?" class="chip-btn whitespace-nowrap bg-white border border-blue-900 text-blue-950 px-4 py-2 rounded-full text-xs font-medium transition-all">Apa kabar?</button>
                <button data-text="Terima kasih" class="chip-btn whitespace-nowrap bg-white border border-blue-900 text-blue-950 px-4 py-2 rounded-full text-xs font-medium transition-all">Terima kasih</button>
                <button data-text="Kerja bagus" class="chip-btn whitespace-nowrap bg-white border border-blue-900 text-blue-950 px-4 py-2 rounded-full text-xs font-medium transition-all">Kerja bagus</button>
            </div>

        </div>

        <div class="absolute bottom-0 left-0 right-0 h-18 bg-white border-t border-gray-100 px-4 py-2 flex justify-between items-center">
            <button class="flex flex-col items-center justify-center flex-1 text-gray-400 hover:text-blue-600 transition-all">
                <i class="fa-solid fa-house text-lg mb-0.5"></i>
                <span class="text-[10px] font-medium">Beranda</span>
            </button>
            <button class="flex flex-col items-center justify-center flex-1 text-blue-600 transition-all">
                <div class="bg-blue-50 px-5 py-1 rounded-full flex flex-col items-center justify-center">
                    <i class="fa-solid fa-language text-lg mb-0.5"></i>
                    <span class="text-[10px] font-bold">Terjemah</span>
                </div>
            </button>
            <button class="flex flex-col items-center justify-center flex-1 text-gray-400 hover:text-blue-600 transition-all">
                <i class="fa-solid fa-book-open text-lg mb-0.5"></i>
                <span class="text-[10px] font-medium">Kamus</span>
            </button>
            <button class="flex flex-col items-center justify-center flex-1 text-gray-400 hover:text-blue-600 transition-all">
                <i class="fa-solid fa-asterisk text-lg mb-0.5"></i>
                <span class="text-[10px] font-medium">Darurat</span>
            </button>
            <button class="flex flex-col items-center justify-center flex-1 text-gray-400 hover:text-blue-600 transition-all">
                <i class="fa-solid fa-user text-lg mb-0.5"></i>
                <span class="text-[10px] font-medium">Profil</span>
            </button>
        </div>

    </div>

    <script>
        const textarea = document.getElementById('input-text');
        const charCount = document.getElementById('char-count');
        const chipButtons = document.querySelectorAll('.chip-btn');
        const btnTranslate = document.getElementById('btn-translate');
        const maskotImg = document.getElementById('maskot-img');
        const btnRepeat = document.getElementById('btn-repeat');

        function updateWordCount() {
            const textValue = textarea.value.trim();
            const words = textValue ? textValue.split(/\s+/) : [];
            const wordLength = words.length;
            
            charCount.textContent = `${wordLength}/50 kata`;

            if (wordLength > 50) {
                charCount.classList.add('text-red-500');
                btnTranslate.disabled = true;
            } else {
                charCount.classList.remove('text-red-500');
                btnTranslate.disabled = false;
            }

            if (textValue === "") {
                resetChips();
                maskotImg.src = "public/halo.png";
            } else {
                syncVisualState(textValue);
            }
        }

        function resetChips() {
            chipButtons.forEach(btn => {
                btn.classList.remove('bg-blue-950', 'text-white');
                btn.classList.add('bg-white', 'text-blue-950', 'border-blue-900');
            });
        }

        function syncVisualState(currentText) {
            resetChips();
            const normalizedText = currentText.toLowerCase().trim();

            if (normalizedText === "terima kasih") {
                maskotImg.src = "public/terimakasih.png"; 
                highlightChip("Terima kasih");
            } else if (normalizedText === "kerja bagus") {
                maskotImg.src = "public/jempol.png"; 
                highlightChip("Kerja bagus");
            } else {
                maskotImg.src = "public/halo.png";
            }
        }

        function highlightChip(chipText) {
            chipButtons.forEach(btn => {
                if (btn.getAttribute('data-text') === chipText) {
                    btn.classList.remove('bg-white', 'text-blue-950');
                    btn.classList.add('bg-blue-950', 'text-white');
                }
            });
        }

        textarea.addEventListener('input', updateWordCount);

        chipButtons.forEach(button => {
            button.addEventListener('click', () => {
                const targetText = button.getAttribute('data-text');
                textarea.value = targetText;
                updateWordCount();
            });
        });

        btnTranslate.addEventListener('click', () => {
            if (textarea.value.trim() === "") {
                alert("Silakan ketik atau pilih kalimat cepat terlebih dahulu!");
                return;
            }
            syncVisualState(textarea.value);
        });

        btnRepeat.addEventListener('click', () => {
            maskotImg.style.opacity = '0.4';
            setTimeout(() => {
                maskotImg.style.opacity = '1';
            }, 150);
        });
    </script>
</body>
</html>
